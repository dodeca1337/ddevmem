<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ddevmem — Register Maps</title>
<style>
  :root {
    --bg: #1e1e2e; --surface: #282840; --border: #3a3a5c;
    --text: #cdd6f4; --text2: #9399b2; --accent: #89b4fa;
    --green: #a6e3a1; --red: #f38ba8; --yellow: #f9e2af;
    --orange: #fab387;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'JetBrains Mono', 'Fira Code', monospace; background: var(--bg); color: var(--text); padding: 1rem; }
  h1 { color: var(--accent); margin-bottom: .5rem; font-size: 1.3rem; }
  h2 { color: var(--accent); margin: 1.5rem 0 .25rem; font-size: 1.1rem; border-bottom: 1px solid var(--border); padding-bottom: .25rem; }
  .meta { color: var(--text2); font-size: .8rem; margin-bottom: .5rem; }
  .reg-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
  .reg-header { display: flex; align-items: center; gap: .75rem; flex-wrap: wrap; margin-bottom: .5rem; }
  .reg-name { font-weight: 700; font-size: 1.05rem; color: var(--accent); }
  .reg-offset { color: var(--text2); font-size: .8rem; }
  .badge { font-size: .7rem; padding: 2px 6px; border-radius: 4px; font-weight: 600; text-transform: uppercase; }
  .badge-rw { background: var(--green); color: #1e1e2e; }
  .badge-ro { background: var(--yellow); color: #1e1e2e; }
  .badge-wo { background: var(--orange); color: #1e1e2e; }
  .reg-doc { color: var(--text2); font-size: .8rem; margin-bottom: .5rem; font-style: italic; }
  .reg-value { display: flex; align-items: center; gap: .5rem; margin-bottom: .5rem; flex-wrap: wrap; }
  .reg-value input { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 4px 8px; border-radius: 4px; font-family: inherit; font-size: .85rem; width: 10ch; }
  .reg-value .hex { color: var(--text2); font-size: .8rem; min-width: 12ch; }
  button { background: var(--accent); color: var(--bg); border: none; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-family: inherit; font-size: .8rem; font-weight: 600; }
  button:hover { opacity: .85; }
  button.write-btn { background: var(--orange); }
  .bitfields { margin-top: .5rem; }
  .bf-table { width: 100%; border-collapse: collapse; font-size: .8rem; }
  .bf-table th, .bf-table td { padding: 3px 8px; border: 1px solid var(--border); text-align: left; }
  .bf-table th { background: var(--bg); color: var(--text2); font-weight: 600; }
  .bf-val { color: var(--green); font-weight: 600; }
  .bf-doc { color: var(--text2); font-style: italic; }
  .bf-input { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 2px 6px; border-radius: 3px; font-family: inherit; font-size: .8rem; width: 8ch; }
  select.bf-input { width: auto; min-width: 10ch; }
  .error { color: var(--red); font-size: .8rem; }
  .status { font-size: .75rem; color: var(--text2); margin-left: .5rem; }
  #auto-refresh { margin: 0 .5rem; }
  .toolbar { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap; }
  .toolbar label { font-size: .8rem; color: var(--text2); cursor: pointer; }
  .summary { color: var(--text2); font-size: .85rem; margin-bottom: 1rem; }
</style>
</head>
<body>

<h1>ddevmem — Register Maps</h1>
<div class="summary" id="summary"></div>

<div class="toolbar">
  <button onclick="refreshAll()">Refresh All</button>
  <label><input type="checkbox" id="auto-refresh"> Auto-refresh (1s)</label>
  <span class="status" id="global-status"></span>
</div>

<div id="maps"></div>

<script>
const API_BASE = window.location.pathname.replace(/\/?$/, '/') + 'api';
let allMaps = []; // { slug, name, info }
let autoTimer = null;

const $  = id => document.getElementById(id);
const ce = tag => document.createElement(tag);

async function api(path, body) {
  const opts = body !== undefined
    ? { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) }
    : {};
  const r = await fetch(API_BASE + path, opts);
  if (!r.ok) throw new Error(r.status + ' ' + r.statusText);
  if (r.headers.get('content-type')?.includes('json')) return r.json();
}

function hexStr(val, bits) {
  const digits = Math.ceil(bits / 4);
  return '0x' + BigInt(val).toString(16).toUpperCase().padStart(digits, '0');
}

function extractBits(val, lo, hi) {
  const v = BigInt(val);
  const width = BigInt(hi - lo + 1);
  const mask = (1n << width) - 1n;
  return Number((v >> BigInt(lo)) & mask);
}

function setBits(oldVal, lo, hi, newFieldVal) {
  let v = BigInt(oldVal);
  const width = BigInt(hi - lo + 1);
  const mask = (1n << width) - 1n;
  v = (v & ~(mask << BigInt(lo))) | ((BigInt(newFieldVal) & mask) << BigInt(lo));
  return Number(v & ((1n << 64n) - 1n));
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

async function init() {
  try {
    const maps = await api('/maps');
    $('summary').textContent = maps.length + ' register map(s)';

    const infos = await Promise.all(maps.map(m => api('/' + m.slug + '/info')));
    allMaps = maps.map((m, i) => ({ slug: m.slug, name: m.name, info: infos[i] }));

    renderAll();
    refreshAll();
  } catch (e) {
    $('maps').innerHTML = '<div class="error">Failed to load: ' + escHtml(e.message) + '</div>';
  }
}

function renderAll() {
  const container = $('maps');
  container.innerHTML = '';
  for (const map of allMaps) {
    const info = map.info;
    const section = ce('div');
    section.id = 'map-' + map.slug;

    let html = '<h2>' + escHtml(info.name) + '</h2>';
    html += '<div class="meta">' + escHtml(map.slug) + ' · Base: ' + hexStr(info.base_address, 32)
          + ' · Bus: ' + (info.bus_width * 8) + '-bit · ' + info.registers.length + ' register(s)</div>';

    for (const reg of info.registers) {
      const uid = map.slug + '-' + reg.offset;
      html += '<div class="reg-card" id="reg-' + uid + '">';
      html += '<div class="reg-header">'
            + '<span class="reg-name">' + escHtml(reg.name) + '</span>'
            + '<span class="badge badge-' + reg.access + '">' + reg.access + '</span>'
            + '<span class="reg-offset">' + hexStr(reg.offset, 16) + ' (' + reg.width + '-bit)</span>'
            + '</div>';
      if (reg.doc) html += '<div class="reg-doc">' + escHtml(reg.doc) + '</div>';

      html += '<div class="reg-value">';
      if (reg.access !== 'wo') {
        html += '<span>Value:</span><span class="hex" id="val-' + uid + '">—</span>';
      }
      if (reg.access !== 'ro') {
        html += '<input id="inp-' + uid + '" placeholder="hex value">'
              + '<button class="write-btn" onclick="writeReg(\'' + map.slug + '\',' + reg.offset + ',' + reg.width + ')">Write</button>';
      }
      if (reg.access !== 'wo') {
        html += '<button onclick="readReg(\'' + map.slug + '\',' + reg.offset + ',' + reg.width + ')">Read</button>';
      }
      html += '<span class="status" id="st-' + uid + '"></span></div>';

      if (reg.bitfields.length > 0) {
        html += '<div class="bitfields"><table class="bf-table"><thead><tr>'
              + '<th>Field</th><th>Bits</th><th>Value</th>';
        if (reg.access !== 'ro') html += '<th>Set</th>';
        html += '<th>Doc</th></tr></thead><tbody>';
        for (const bf of reg.bitfields) {
          const bits = bf.lo === bf.hi ? '' + bf.lo : bf.hi + ':' + bf.lo;
          const bfid = uid + '-' + bf.name;
          html += '<tr><td>' + escHtml(bf.name) + '</td><td>' + bits + '</td>'
                + '<td class="bf-val" id="bf-' + bfid + '">—</td>';
          if (reg.access !== 'ro') {
            html += '<td>';
            if (bf.variants && bf.variants.length > 0) {
              html += '<select class="bf-input" id="bfi-' + bfid + '">';
              for (const v of bf.variants) {
                html += '<option value="' + v.value + '">' + escHtml(v.name) + ' (' + v.value + ')</option>';
              }
              html += '</select>';
            } else {
              html += '<input class="bf-input" id="bfi-' + bfid + '" placeholder="val">';
            }
            html += ' <button onclick="writeBitfield(\'' + map.slug + '\',' + reg.offset + ',' + bf.lo + ',' + bf.hi + ',\'' + bf.name + '\',' + reg.width + ')">Set</button></td>';
          }
          html += '<td class="bf-doc">' + escHtml(bf.doc) + '</td></tr>';
        }
        html += '</tbody></table></div>';
      }
      html += '</div>';
    }
    section.innerHTML = html;
    container.appendChild(section);
  }
}

async function readReg(slug, offset, width) {
  const uid = slug + '-' + offset;
  const st = $('st-' + uid);
  try {
    const resp = await api('/' + slug + '/read', { offset });
    const el = $('val-' + uid);
    if (el) el.textContent = hexStr(resp.value, width);
    updateBitfields(slug, offset, resp.value);
    if (st) st.textContent = '';
  } catch (e) {
    if (st) st.textContent = e.message;
  }
}

function updateBitfields(slug, offset, value) {
  const map = allMaps.find(m => m.slug === slug);
  if (!map) return;
  const reg = map.info.registers.find(r => r.offset === offset);
  if (!reg) return;
  for (const bf of reg.bitfields) {
    const el = $('bf-' + slug + '-' + offset + '-' + bf.name);
    if (!el) continue;
    const rawVal = extractBits(value, bf.lo, bf.hi);
    if (bf.variants && bf.variants.length > 0) {
      const v = bf.variants.find(v => v.value === rawVal);
      el.textContent = v ? v.name + ' (' + rawVal + ')' : String(rawVal);
      const sel = $('bfi-' + slug + '-' + offset + '-' + bf.name);
      if (sel && sel.tagName === 'SELECT') sel.value = String(rawVal);
    } else {
      el.textContent = rawVal;
    }
  }
}

async function writeReg(slug, offset, width) {
  const uid = slug + '-' + offset;
  const inp = $('inp-' + uid);
  const st = $('st-' + uid);
  if (!inp) return;
  try {
    const value = Number(inp.value.trim());
    if (isNaN(value)) throw new Error('invalid number');
    await api('/' + slug + '/write', { offset, value });
    if (st) st.textContent = 'written';
    await readReg(slug, offset, width);
  } catch (e) {
    if (st) st.textContent = e.message;
  }
}

async function writeBitfield(slug, offset, lo, hi, name, width) {
  const uid = slug + '-' + offset;
  const inp = $('bfi-' + uid + '-' + name);
  const st = $('st-' + uid);
  if (!inp) return;
  try {
    const fieldVal = Number(inp.value.trim());
    if (isNaN(fieldVal)) throw new Error('invalid number');
    const resp = await api('/' + slug + '/read', { offset });
    const newVal = setBits(resp.value, lo, hi, fieldVal);
    await api('/' + slug + '/write', { offset, value: newVal });
    if (st) st.textContent = name + ' updated';
    await readReg(slug, offset, width);
  } catch (e) {
    if (st) st.textContent = e.message;
  }
}

async function refreshAll() {
  for (const map of allMaps) {
    for (const reg of map.info.registers) {
      if (reg.access !== 'wo') readReg(map.slug, reg.offset, reg.width);
    }
  }
}

$('auto-refresh').addEventListener('change', function() {
  if (this.checked) {
    autoTimer = setInterval(refreshAll, 1000);
  } else {
    clearInterval(autoTimer);
    autoTimer = null;
  }
});

init();
</script>
</body>
</html>
