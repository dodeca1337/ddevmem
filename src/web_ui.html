<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ddevmem — Register Map</title>
<style>
  :root {
    --bg: #1e1e2e; --surface: #282840; --border: #3a3a5c;
    --text: #cdd6f4; --text2: #9399b2; --accent: #89b4fa;
    --green: #a6e3a1; --red: #f38ba8; --yellow: #f9e2af;
    --orange: #fab387;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'JetBrains Mono', 'Fira Code', monospace; background: var(--bg); color: var(--text); padding: 1rem; }
  h1 { color: var(--accent); margin-bottom: .25rem; font-size: 1.3rem; }
  .meta { color: var(--text2); font-size: .8rem; margin-bottom: 1rem; }
  .reg-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
  .reg-header { display: flex; align-items: center; gap: .75rem; flex-wrap: wrap; margin-bottom: .5rem; }
  .reg-name { font-weight: 700; font-size: 1.05rem; color: var(--accent); }
  .reg-offset { color: var(--text2); font-size: .8rem; }
  .badge { font-size: .7rem; padding: 2px 6px; border-radius: 4px; font-weight: 600; text-transform: uppercase; }
  .badge-rw { background: var(--green); color: #1e1e2e; }
  .badge-ro { background: var(--yellow); color: #1e1e2e; }
  .badge-wo { background: var(--orange); color: #1e1e2e; }
  .reg-doc { color: var(--text2); font-size: .8rem; margin-bottom: .5rem; font-style: italic; }
  .reg-value { display: flex; align-items: center; gap: .5rem; margin-bottom: .5rem; flex-wrap: wrap; }
  .reg-value input { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 4px 8px; border-radius: 4px; font-family: inherit; font-size: .85rem; width: 10ch; }
  .reg-value .hex { color: var(--text2); font-size: .8rem; min-width: 12ch; }
  button { background: var(--accent); color: var(--bg); border: none; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-family: inherit; font-size: .8rem; font-weight: 600; }
  button:hover { opacity: .85; }
  button.write-btn { background: var(--orange); }
  .bitfields { margin-top: .5rem; }
  .bf-table { width: 100%; border-collapse: collapse; font-size: .8rem; }
  .bf-table th, .bf-table td { padding: 3px 8px; border: 1px solid var(--border); text-align: left; }
  .bf-table th { background: var(--bg); color: var(--text2); font-weight: 600; }
  .bf-val { color: var(--green); font-weight: 600; }
  .bf-doc { color: var(--text2); font-style: italic; }
  .bf-input { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 2px 6px; border-radius: 3px; font-family: inherit; font-size: .8rem; width: 8ch; }
  .error { color: var(--red); font-size: .8rem; }
  .status { font-size: .75rem; color: var(--text2); margin-left: .5rem; }
  #auto-refresh { margin: 0 .5rem; }
  .toolbar { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap; }
  .toolbar label { font-size: .8rem; color: var(--text2); cursor: pointer; }
</style>
</head>
<body>

<h1 id="title">ddevmem Register Map</h1>
<div class="meta" id="meta"></div>

<div class="toolbar">
  <button onclick="refreshAll()">Refresh All</button>
  <label><input type="checkbox" id="auto-refresh"> Auto-refresh (1s)</label>
  <span class="status" id="global-status"></span>
</div>

<div id="registers"></div>

<script>
let mapInfo = null;
let autoTimer = null;
const API_BASE = window.location.pathname.replace(/\/?$/, '/') + 'api';

const $  = id => document.getElementById(id);
const ce = tag => document.createElement(tag);

async function api(path, body) {
  const opts = body !== undefined
    ? { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) }
    : {};
  const r = await fetch(API_BASE + path, opts);
  if (!r.ok) throw new Error(r.status + ' ' + r.statusText);
  if (r.headers.get('content-type')?.includes('json')) return r.json();
}

function hexStr(val, bits) {
  const digits = Math.ceil(bits / 4);
  return '0x' + BigInt(val).toString(16).toUpperCase().padStart(digits, '0');
}

function extractBits(val, lo, hi) {
  const v = BigInt(val);
  const width = BigInt(hi - lo + 1);
  const mask = (1n << width) - 1n;
  return Number((v >> BigInt(lo)) & mask);
}

function setBits(oldVal, lo, hi, newFieldVal) {
  let v = BigInt(oldVal);
  const width = BigInt(hi - lo + 1);
  const mask = (1n << width) - 1n;
  v = (v & ~(mask << BigInt(lo))) | ((BigInt(newFieldVal) & mask) << BigInt(lo));
  return Number(v & ((1n << 64n) - 1n));
}

async function init() {
  try {
    mapInfo = await api('/info');
    $('title').textContent = mapInfo.name + ' — Register Map';
    $('meta').textContent = `Base: ${hexStr(mapInfo.base_address, 32)}  |  Bus width: ${mapInfo.bus_width * 8} bit  |  ${mapInfo.registers.length} register(s)`;
    renderRegisters();
    refreshAll();
  } catch (e) {
    $('registers').innerHTML = `<div class="error">Failed to load register info: ${e.message}</div>`;
  }
}

function renderRegisters() {
  const container = $('registers');
  container.innerHTML = '';
  for (const reg of mapInfo.registers) {
    const card = ce('div');
    card.className = 'reg-card';
    card.id = 'reg-' + reg.offset;

    let html = `<div class="reg-header">
      <span class="reg-name">${reg.name}</span>
      <span class="badge badge-${reg.access}">${reg.access}</span>
      <span class="reg-offset">${hexStr(reg.offset, 16)} (${reg.width}-bit)</span>
    </div>`;

    if (reg.doc) html += `<div class="reg-doc">${escHtml(reg.doc)}</div>`;

    if (reg.access !== 'wo') {
      html += `<div class="reg-value">
        <span>Value:</span>
        <span class="hex" id="val-${reg.offset}">—</span>`;
    }

    if (reg.access !== 'ro') {
      html += `<input id="inp-${reg.offset}" placeholder="hex value">
        <button class="write-btn" onclick="writeReg(${reg.offset}, ${reg.width})">Write</button>`;
    }

    if (reg.access !== 'wo') {
      html += `<button onclick="readReg(${reg.offset}, ${reg.width})">Read</button>`;
    }

    html += `<span class="status" id="st-${reg.offset}"></span></div>`;

    if (reg.bitfields.length > 0) {
      html += `<div class="bitfields"><table class="bf-table"><thead><tr>
        <th>Field</th><th>Bits</th><th>Value</th>`;
      if (reg.access !== 'ro') html += `<th>Set</th>`;
      html += `<th>Doc</th></tr></thead><tbody>`;
      for (const bf of reg.bitfields) {
        const bits = bf.lo === bf.hi ? `${bf.lo}` : `${bf.hi}:${bf.lo}`;
        html += `<tr>
          <td>${bf.name}</td>
          <td>${bits}</td>
          <td class="bf-val" id="bf-${reg.offset}-${bf.name}">—</td>`;
        if (reg.access !== 'ro') {
          html += `<td><input class="bf-input" id="bfi-${reg.offset}-${bf.name}" placeholder="val">
            <button onclick="writeBitfield(${reg.offset},${bf.lo},${bf.hi},'${bf.name}',${reg.width})">Set</button></td>`;
        }
        html += `<td class="bf-doc">${escHtml(bf.doc)}</td></tr>`;
      }
      html += `</tbody></table></div>`;
    }

    card.innerHTML = html;
    container.appendChild(card);
  }
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

async function readReg(offset, width) {
  const st = $('st-' + offset);
  try {
    const resp = await api('/read', { offset });
    const el = $('val-' + offset);
    if (el) el.textContent = hexStr(resp.value, width);
    updateBitfields(offset, resp.value);
    if (st) st.textContent = '';
  } catch (e) {
    if (st) st.textContent = e.message;
  }
}

function updateBitfields(offset, value) {
  const reg = mapInfo.registers.find(r => r.offset === offset);
  if (!reg) return;
  for (const bf of reg.bitfields) {
    const el = $('bf-' + offset + '-' + bf.name);
    if (el) el.textContent = extractBits(value, bf.lo, bf.hi);
  }
}

async function writeReg(offset, width) {
  const inp = $('inp-' + offset);
  const st = $('st-' + offset);
  if (!inp) return;
  try {
    const value = Number(inp.value.trim());
    if (isNaN(value)) throw new Error('invalid number');
    await api('/write', { offset, value });
    if (st) st.textContent = 'written';
    await readReg(offset, width);
  } catch (e) {
    if (st) st.textContent = e.message;
  }
}

async function writeBitfield(offset, lo, hi, name, width) {
  const inp = $('bfi-' + offset + '-' + name);
  const st = $('st-' + offset);
  if (!inp) return;
  try {
    const fieldVal = Number(inp.value.trim());
    if (isNaN(fieldVal)) throw new Error('invalid number');
    const resp = await api('/read', { offset });
    const newVal = setBits(resp.value, lo, hi, fieldVal);
    await api('/write', { offset, value: newVal });
    if (st) st.textContent = `${name} updated`;
    await readReg(offset, width);
  } catch (e) {
    if (st) st.textContent = e.message;
  }
}

async function refreshAll() {
  if (!mapInfo) return;
  for (const reg of mapInfo.registers) {
    if (reg.access !== 'wo') {
      readReg(reg.offset, reg.width);
    }
  }
}

$('auto-refresh').addEventListener('change', function() {
  if (this.checked) {
    autoTimer = setInterval(refreshAll, 1000);
  } else {
    clearInterval(autoTimer);
    autoTimer = null;
  }
});

init();
</script>
</body>
</html>
