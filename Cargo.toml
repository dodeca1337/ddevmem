[workspace.package]
version = "0.4.0+alpha"
edition = "2024"
authors = ["Dodeca Shaven <dodeca@tutamail.com>"]
repository = "https://github.com/dodeca1337/ddevmem"
license = "MIT"

[workspace]
members = ["crates/*"]

[package]
name = "ddevmem"
keywords = ["devmem"]
version.workspace = true
edition.workspace = true
authors.workspace = true
repository.workspace = true
license.workspace = true

[dependencies]
ddevmem-core = { path = "crates/ddevmem-core" }

[features]
default = ["device"]
device = ["ddevmem-core/device"]
emulator = ["ddevmem-core/emulator"]
